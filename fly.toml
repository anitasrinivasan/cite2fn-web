# fly.toml app configuration file generated for cite2fn-api on 2026-04-18T22:01:56-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cite2fn-api'
primary_region = 'iad'

[build]
  dockerfile = 'api/Dockerfile'

[env]
  STORAGE_DIR = '/data'

[[mounts]]
  source = 'cite2fn_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
